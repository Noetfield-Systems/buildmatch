name: Deploy static site to GitHub Pages

on:
  # Soft-disabled 2026-07-12: the live site is served by the gh-pages branch (build_type=legacy,
  # HTTP 200). This Actions->Pages workflow is superseded and failed red on every push to main
  # ("Get Pages site failed"). Trigger is now manual-only so it stops firing red without touching
  # the live deploy. To ADOPT this workflow as the deploy path instead, the founder must set
  # Settings > Pages > Source = "GitHub Actions" (or add `enablement: true` to configure-pages)
  # AND scope the upload path away from repo root — see PR discussion.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
